<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Support</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00BFFF;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.logo{
width:120px;
margin-top:10px;
margin-bottom:10px;
}

.store-name{
font-size:24px;
font-weight:bold;
}

.address{
font-size:14px;
color:#555;
margin-bottom:20px;
}

.help-text{
font-size:16px;
margin-bottom:20px;
line-height:1.4;
}

.button{
display:block;
background:#00BFFF;
color:white;
padding:16px;
margin:12px 0;
border-radius:12px;
text-decoration:none;
font-size:17px;
font-weight:bold;
transition:0.15s;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.button-alt{
display:block;
background:#F8F6EF;
color:#333;
padding:16px;
margin:12px 0;
border-radius:12px;
text-decoration:none;
font-size:17px;
font-weight:bold;
transition:0.15s;
box-shadow:0 3px 8px rgba(0,0,0,0.12);
}

.button:hover,
.button-alt:hover{
transform:scale(0.98);
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
max-width:300px;
}

.popup img{
width:220px;
}

.close-btn{
margin-top:10px;
padding:10px 20px;
border:none;
background:#00BFFF;
color:white;
border-radius:8px;
font-size:15px;
}

</style>

</head>


<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="store-name">
Lemon Laundry
</div>

<div class="address">
142 Dang Vu Hy St.
</div>

<div class="help-text">
Need help or have any questions?<br>
Feel free to contact us.
</div>


<a class="button"
href="https://wa.me/84941306684?text=Hello%20Lemon%20Laundry%2C%20I%20need%20help">
WhatsApp
</a>


<a class="button-alt" href="tel:+84941306684">
Call Store
</a>


<a class="button"
href="https://zalo.me/84941306684">
Zalo
</a>


<a class="button-alt" onclick="showWeChat()">
WeChat
</a>


<a class="button"
href="https://open.kakao.com/o/xxxx">
KakaoTalk
</a>


<a class="button-alt"
href="https://line.me/ti/p/pbe9AtUYLh">
LINE
</a>

</div>


<div id="wechatPopup" class="popup">

<div class="popup-content">

<h3>Add us on WeChat</h3>

<img src="wechat-qr.png">

<p>Scan this QR code in WeChat</p>

<button class="close-btn" onclick="closeWeChat()">Close</button>

</div>

</div>


<script>

function showWeChat(){
document.getElementById("wechatPopup").style.display="flex";
}

function closeWeChat(){
document.getElementById("wechatPopup").style.display="none";
}

</script>

</body>

</html>

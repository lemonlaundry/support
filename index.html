<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Support</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00BFFF;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.logo{
width:120px;
margin-bottom:10px;
}

.store-name{
font-size:24px;
font-weight:bold;
}

.address{
font-size:14px;
color:#555;
margin-bottom:20px;
}

.help-text{
font-size:16px;
margin-bottom:20px;
}

.button, .button-alt{
display:flex;
align-items:center;
padding:16px 18px;
margin:12px 0;
border-radius:12px;
text-decoration:none;
font-size:17px;
font-weight:bold;
}

.button{
background:#00BFFF;
color:white;
}

.button-alt{
background:#F3EAD7;
color:#333;
}

.whatsapp{
font-size:18px;
padding:18px;
}

.icon-box{
width:34px;
display:flex;
align-items:center;
justify-content:center;
margin-right:12px;
}

.icon{
width:24px;
height:24px;
object-fit:contain;
}

.button span,
.button-alt span{
flex:1;
text-align:center;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
max-width:300px;
}

.popup img{
width:220px;
}

.close-btn{
margin-top:10px;
padding:10px 20px;
border:none;
background:#00BFFF;
color:white;
border-radius:8px;
font-size:15px;
}

</style>

</head>


<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="store-name">
Lemon Laundry
</div>

<div class="address">
142 Dang Vu Hy<br>

</div>

<div class="help-text">
Need assistance? We're happy to help.
</div>


<!-- WhatsApp -->

<a class="button whatsapp"
href="https://wa.me/84941306684?text=Hello%20Lemon%20Laundry%2C%20I%20need%20help">
<div class="icon-box">
<img src="whatsapp.png" class="icon">
</div>
<span>WhatsApp</span>
</a>


<!-- Call -->

<a class="button-alt" href="tel:+84941306684">
<div class="icon-box">📞</div>
<span>Call Store</span>
</a>


<!-- Zalo -->

<a class="button"
href="https://zalo.me/84941306684">
<div class="icon-box">
<img src="zalo.png" class="icon">
</div>
<span>Zalo</span>
</a>


<!-- WeChat -->

<a class="button-alt" onclick="showWeChat()">
<div class="icon-box">
<img src="wechat.png" class="icon">
</div>
<span>WeChat</span>
</a>


<!-- Kakao -->

<a class="button"
href="https://open.kakao.com/o/xxxx">
<div class="icon-box">
<img src="kakao.png" class="icon">
</div>
<span>KakaoTalk</span>
</a>


<!-- LINE -->

<a class="button-alt"
href="https://line.me/ti/p/xxxx">
<div class="icon-box">
<img src="line.png" class="icon">
</div>
<span>LINE</span>
</a>

</div>


<!-- WeChat popup -->

<div id="wechatPopup" class="popup">

<div class="popup-content">

<h3>Add us on WeChat</h3>

<img src="wechat-qr.png">

<p>Scan this QR code in WeChat</p>

<button class="close-btn" onclick="closeWeChat()">Close</button>

</div>

</div>


<script>

function showWeChat(){
document.getElementById("wechatPopup").style.display="flex";
}

function closeWeChat(){
document.getElementById("wechatPopup").style.display="none";
}

</script>

</body>

</html>

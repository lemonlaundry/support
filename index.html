<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lemon Laundry Support</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#00BFFF;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:16px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.logo{
width:120px;
margin-bottom:10px;
}

.store-name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.address{
font-size:14px;
color:#555;
margin-bottom:20px;
}

.help-text{
font-size:16px;
margin-bottom:20px;
}

.button{
display:block;
background:#00BFFF;
color:white;
padding:14px;
margin:10px 0;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:bold;
}

.button:hover{
opacity:0.9;
}

.whatsapp{
font-size:18px;
padding:18px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
max-width:300px;
}

.popup img{
width:220px;
}

.close-btn{
margin-top:10px;
padding:10px 20px;
border:none;
background:#00BFFF;
color:white;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="store-name">
Lemon Laundry
</div>

<div class="address">
142 Dang Vu Hy<br>
Da Nang, Vietnam
</div>

<div class="help-text">
Need help? Contact us
</div>

<a class="button whatsapp"
href="https://wa.me/84941306684?text=Hello%20I%20need%20help%20with%20the%20washing%20machine">
Chat on WhatsApp
</a>

<a class="button"
href="https://zalo.me/84941306684">
Contact on Zalo
</a>

<a class="button" onclick="showWeChat()">
Add WeChat
</a>

<a class="button"
href="https://open.kakao.com/o/xxxx">
Chat KakaoTalk
</a>

<a class="button"
href="https://line.me/ti/p/xxxx">
Contact LINE
</a>

</div>


<div id="wechatPopup" class="popup">

<div class="popup-content">

<h3>Add us on WeChat</h3>

<img src="wechat-qr.png">

<p>Scan this QR code in WeChat</p>

<button class="close-btn" onclick="closeWeChat()">Close</button>

</div>

</div>


<script>

function showWeChat(){
document.getElementById("wechatPopup").style.display="flex";
}

function closeWeChat(){
document.getElementById("wechatPopup").style.display="none";
}

</script>

</body>
</html>
